name: Pumpkin-Android-AutoBuild

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    env:
      ANDROID_PLATFORM: "23"
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout Tracker
        uses: actions/checkout@v4

      - name: Check for Updates
        id: check_version
        run: |
          LATEST_ID=$(git ls-remote https://github.com/Pumpkin-MC/Pumpkin.git HEAD | awk '{print $1}')
          echo "latest_id=$LATEST_ID" >> $GITHUB_ENV

          if [ -f version_tracker.txt ]; then
            OLD_ID=$(cat version_tracker.txt)
          else
            OLD_ID="none"
          fi

          if [ "$LATEST_ID" = "$OLD_ID" ]; then
            echo "match=true" >> $GITHUB_OUTPUT
            echo "No new updates. Skipping build."
          else
            echo "match=false" >> $GITHUB_OUTPUT
            echo "New version found! Starting build..."
          fi

      - name: Download Pumpkin Source
        if: steps.check_version.outputs.match == 'false'
        uses: actions/checkout@v4
        with:
          repository: 'Pumpkin-MC/Pumpkin'
          path: 'pumpkin-source'

      - name: Patch 32-bit Bug & Legacy Android Linker
        if: steps.check_version.outputs.match == 'false'
        working-directory: ./pumpkin-source
        run: |
          # Fix the 32-bit integer conversion bug
          sed -i 's/i64::from_ne_bytes(height_bit_bytes)/isize::from_ne_bytes(height_bit_bytes) as i64/g' pumpkin-world/src/chunk/mod.rs || true
          
          # Inject dummy unwind symbol to prevent "CANNOT LINK EXECUTABLE" on Android 6.0
          MAIN_RS=$(find . -path "*/src/main.rs" -o -name "main.rs" | head -n 1)
          echo '
          #[no_mangle]
          pub extern "C" fn __gnu_Unwind_Find_exidx(_pc: usize, _pcount: *mut i32) -> usize { 0 }
          ' >> "$MAIN_RS"
          echo "Patched $MAIN_RS with dummy unwind symbol."

      - name: Setup Rust (stable)
        if: steps.check_version.outputs.match == 'false'
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (file/readelf)
        if: steps.check_version.outputs.match == 'false'
        run: sudo apt-get update && sudo apt-get install -y binutils file unzip

      - name: Download & setup Android NDK (r21e)
        if: steps.check_version.outputs.match == 'false'
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: 'r21e'

      - name: Install cargo-ndk
        if: steps.check_version.outputs.match == 'false'
        run: cargo install cargo-ndk --locked

      - name: Build with cargo-ndk for armeabi-v7a (API 23)
        if: steps.check_version.outputs.match == 'false'
        working-directory: ./pumpkin-source
        env:
          CARGO_PROFILE_RELEASE_PANIC: abort
        run: |
          # Force cargo-ndk to use the EXACT path from the setup step
          export ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
          export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
          
          echo "Using NDK at: $ANDROID_NDK_HOME"
          
          # Execute build
          cargo ndk -t armeabi-v7a --platform ${ANDROID_PLATFORM} --release build

          # Find and prep binary
          echo "=== Finding produced binary ==="
          BIN_PATH=$(find target -type f -name pumpkin -not -path "*/deps/*" | head -n1 || true)
          if [ -z "$BIN_PATH" ]; then
            echo "Binary not found — checking release directory structure:"
            find target -maxdepth 4 -type f || true
            exit 1
          fi
          
          echo "Found binary at: $BIN_PATH"
          mkdir -p ../artifacts
          cp "$BIN_PATH" ../artifacts/pumpkin_android_armv7_api${ANDROID_PLATFORM}
          
          # Final validation check
          readelf -Ws ../artifacts/pumpkin_android_armv7_api${ANDROID_PLATFORM} | grep "__gnu_Unwind_Find_exidx" || echo "Symbol successfully handled."

      - name: Upload Finished Server
        if: steps.check_version.outputs.match == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: pumpkin-android-32bit
          path: artifacts/pumpkin_android_armv7_api${{ env.ANDROID_PLATFORM }}

      - name: Save Version ID
        if: steps.check_version.outputs.match == 'false'
        run: |
          echo "${{ env.latest_id }}" > version_tracker.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version_tracker.txt
          git commit -m "Updated tracker to version ${{ env.latest_id }}" || echo "nothing to commit"
          git push || echo "push failed"
