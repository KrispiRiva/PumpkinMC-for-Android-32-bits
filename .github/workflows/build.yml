name: Pumpkin-Android-AutoBuild

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Tracker
        uses: actions/checkout@v4

      - name: Check for Updates
        id: check_version
        run: |
          LATEST_ID=$(git ls-remote https://github.com/Pumpkin-MC/Pumpkin.git HEAD | awk '{print $1}')
          echo "latest_id=$LATEST_ID" >> $GITHUB_ENV
          
          if [ -f version_tracker.txt ]; then
            OLD_ID=$(cat version_tracker.txt)
          else
            OLD_ID="none"
          fi
          
          if [ "$LATEST_ID" = "$OLD_ID" ]; then
            echo "match=true" >> $GITHUB_OUTPUT
            echo "No new updates. Skipping build."
          else
            echo "match=false" >> $GITHUB_OUTPUT
            echo "New version found! Starting build..."
          fi

      - name: Download Pumpkin Source
        if: steps.check_version.outputs.match == 'false'
        uses: actions/checkout@v4
        with:
          repository: 'Pumpkin-MC/Pumpkin'
          path: 'pumpkin-source'

      - name: Patch 32-bit Bug in PumpkinMC
        if: steps.check_version.outputs.match == 'false'
        working-directory: ./pumpkin-source
        run: |
          sed -i 's/i64::from_ne_bytes(height_bit_bytes)/isize::from_ne_bytes(height_bit_bytes) as i64/g' pumpkin-world/src/chunk/mod.rs || true

      - name: Setup Rust (stable)
        if: steps.check_version.outputs.match == 'false'
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        if: steps.check_version.outputs.match == 'false'
        run: cargo install cross --locked

      # Optional: install readelf/file utilities
      - name: Ensure readelf/file exists
        if: steps.check_version.outputs.match == 'false'
        run: sudo apt-get update && sudo apt-get install -y binutils file

      - name: Build for Android 32-bit (armv7)
        if: steps.check_version.outputs.match == 'false'
        working-directory: ./pumpkin-source
        env:
          # keep abort panic profile
          CARGO_PROFILE_RELEASE_PANIC: abort
          # Stronger linking flags: attempt to statically include unwind/gcc unwind
          # Explanation: -Wl,-Bstatic before -lunwind tries to pull static libunwind into the binary.
          # Then -Wl,-Bdynamic returns to dynamic linking for other libs. We also add -lgcc_eh and -lgcc
          # as static linking targets to provide __gnu_Unwind_Find_exidx if needed.
          RUSTFLAGS: >-
            -C link-arg=-Wl,-Bstatic
            -C link-arg=-lunwind
            -C link-arg=-lgcc_eh
            -C link-arg=-lgcc
            -C link-arg=-Wl,-Bdynamic
            -C link-arg=-Wl,-z,now
        run: |
          # Use cross to target armv7 Android (armv7-linux-androideabi)
          # cross will pull the correct cross toolchain/docker image.
          cross build --target armv7-linux-androideabi --release

          # diagnostics: show produced file and unresolved symbols (if any)
          BIN=target/armv7-linux-androideabi/release/pumpkin
          if [ -f "$BIN" ]; then
            echo "=== file output ==="
            file "$BIN"
            echo "=== readelf undefined symbols (dynamic) ==="
            readelf -Ws "$BIN" | awk '$4 == "UND" {print $0}' || true
            echo "=== readelf dynamic needed libs ==="
            readelf -d "$BIN" || true
          else
            echo "Build produced no binary at $BIN"
            ls -la target/armv7-linux-androideabi/release || true
            exit 1
          fi

      - name: Upload Finished Server
        if: steps.check_version.outputs.match == 'false'
        uses: actions/upload-artifact@v6
        with:
          name: pumpkin-android-32bit
          path: pumpkin-source/target/armv7-linux-androideabi/release/pumpkin

      - name: Save Version ID
        if: steps.check_version.outputs.match == 'false'
        run: |
          echo "${{ env.latest_id }}" > version_tracker.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version_tracker.txt
          git commit -m "Updated tracker to version ${{ env.latest_id }}" || echo "nothing to commit"
          git push || echo "push failed (probably no permission)"
